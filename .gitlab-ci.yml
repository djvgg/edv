image: python:3.13

stages:
 - pray
 - lint
 - build
 - test
 - docs

before_script:
  - python --version
  - pip --version  
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt

pray: 
  stage: pray
  script:
    - pip install OmnissiahPrayer
    - echo "Praying for a successful CI run..."
    - python -c "from OmnissiahPrayer import pray; pray()"

lint:
  stage: lint
  script:
    - pip install ruff
    - echo "Running ruff linter..."
    - ruff check backend/ frontend/ utils/
    - pip install reuse
    - reuse lint
    - echo "Checking SPDX headers..."
    - echo "Code quality check passed"
  allow_failure: true

build:
  stage: build
  script:
    - echo "Checking Python syntax..."
    - python -m compileall .
    - echo "Syntax check passed"

test:
  stage: test
  script:
    - echo "Running unit tests with pytest..."
    - pytest tests/

build-docs:
  stage: docs
  script:
  - apt-get update -y
  - apt-get install -y doxygen
  - echo "Building Doxygen documentation..."
  - doxygen Doxyfile
  artifacts:
    paths:
      - html/
