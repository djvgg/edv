image: python:3.13

stages:
 - lint
 - build
 - test
 - docs

before_script:
  - python --version
  - pip --version  
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install ruff
  - apt-get update -y
  - apt-get install -y doxygen

lint:
  stage: lint
  script:
    - echo "Running ruff linter..."
    - ruff check src/ main.py scripts/
    - echo "Code quality check passed"

build:
  stage: build
  script:
    - echo "Checking Python syntax..."
    - python -m compileall .
    - echo "Syntax check passed"

test:
  stage: test
  script:
    - echo "Test temporarily disabled"

build-docs:
  stage: docs
  script:
  - echo "Building Doxygen documentation..."
  - doxygen Doxyfile
  artifacts:
    paths:
      - html/

