# ============================================================================
# Alembic Database Migration Configuration
# ============================================================================
#
# USAGE:
#   python -m alembic upgrade head        # Apply all pending migrations
#   python -m alembic current             # Show current database version
#   python -m alembic history             # Show migration history
#
# IMPORTANT: Run commands from edv_backend/ directory (where alembic.ini is)
#
# If you get "command not found", ensure:
#   1. You're using: python -m alembic (not just: alembic)
#   2. Virtual environment is activated (if using one)
#   3. Alembic is installed: pip install alembic
#
# See README.md "Database Migrations" section for complete documentation
# ============================================================================

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

# DB URL is loaded dynamically in env.py from .env / DB_CONFIG
sqlalchemy.url = postgresql+psycopg2://placeholder/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
